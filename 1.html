<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SST MONITORING PANEL</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 50px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 800px; margin: auto; }
        .card { border: 2px solid #00ff41; padding: 20px; background: rgba(0, 255, 65, 0.05); box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); }
        .val { font-size: 3rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px #00ff41; }
        .label { font-size: 0.9rem; color: #008f11; margin-bottom: 10px; }
        #alert { color: #ff0000; font-size: 1.5rem; visibility: hidden; animation: blink 0.5s infinite; margin-top: 20px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <h1>SYSTEM TRAFFIC MONITOR (80K PPS TEST)</h1>
    
    <div class="grid">
        <div class="card"><div class="label">CPU LOAD</div><div id="cpu" class="val">1%</div></div>
        <div class="card"><div class="label">PACKETS PER SEC</div><div id="pps" class="val">0</div></div>
        <div class="card"><div class="label">TELEGRAM BOTS</div><div id="bots" class="val">0</div></div>
        <div class="card"><div class="label">LATENCY</div><div id="ping" class="val">14ms</div></div>
    </div>

    <div id="alert">!!! ВНИМАНИЕ: ОБНАРУЖЕН FLOOD 80,000 PPS !!!</div>

    <script>
        setInterval(() => {
            let start = performance.now();
            setTimeout(() => {
                let lag = performance.now() - start;
                let isAtaque = lag > 10; // Если твой софт реально нагрузил систему

                // Если есть лаги - показываем твои 80к, если нет - 0
                let ppsValue = isAtaque ? Math.floor(79000 + Math.random() * 5000) : Math.floor(Math.random() * 10);
                
                document.getElementById('cpu').innerText = (isAtaque ? 99 : Math.floor(Math.random() * 4 + 1)) + "%";
                document.getElementById('pps').innerText = ppsValue.toLocaleString();
                document.getElementById('bots').innerText = isAtaque ? 12 : 0;
                document.getElementById('ping').innerText = Math.floor(lag + 12) + "ms";
                document.getElementById('alert').style.visibility = isAtaque ? 'visible' : 'hidden';
            }, 0);
        }, 1000);
    </script>
</body>
</html>
